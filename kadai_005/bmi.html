<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScriptの基礎を学ぼう_5章課題</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #c8f06e;
      --text: #f0f0f0;
      --muted: #888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: var(--accent); }

    input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 1.1rem;
      font-family: 'DM Serif Display', serif;
    }

    input[type="number"]::-webkit-inner-spin-button { display: none; }

    .unit {
      padding: 0 1rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
    }

    button {
      width: 100%;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover  { opacity: 0.85; }
    button:active { transform: scale(0.98); }

    .result {
      display: none;
      margin-top: 1.8rem;
      padding-top: 1.8rem;
      border-top: 1px solid var(--border);
    }

    .result.show {
      display: block;
      animation: fadeUp 0.4s ease both;
    }

    .bmi-number {
      font-family: 'DM Serif Display', serif;
      font-size: 3.8rem;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .bmi-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .bar-bg {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      width: 100%;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0%;
    }

    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .detail {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .detail span { color: var(--text); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>B<span>M</span>I</h1>
    <p class="subtitle">体格指数を計算する</p>

    <div class="field">
      <label>体重</label>
      <div class="input-wrap">
        <input type="number" id="weight" placeholder="65" min="1" max="300">
        <span class="unit">kg</span>
      </div>
    </div>

    <div class="field">
      <label>身長</label>
      <div class="input-wrap">
        <input type="number" id="height" placeholder="170" min="1" max="300">
        <span class="unit">cm</span>
      </div>
    </div>

    <button onclick="calculateBMI()">計算する</button>

    <div class="result" id="result">
      <div class="bmi-number" id="bmiValue">—</div>
      <div class="bmi-label" id="bmiCategory">—</div>
      <div class="bar-bg">
        <div class="bar-fill" id="barFill"></div>
      </div>
      <div class="bar-labels">
        <span>低体重 &lt;18.5</span>
        <span>標準 18.5–25</span>
        <span>肥満 &gt;25</span>
      </div>
      <div class="detail" id="detail"></div>
    </div>
  </div>

  <script src="bmi.js"></script>
</body>
</html>
